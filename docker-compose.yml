services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "NoweSilneHaslo123!"
    ports:
      - "1433:1433"
    volumes:
      - dbdata:/var/opt/mssql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Forge.Desk.WebApi/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=TaskManagerDb;User Id=sa;Password=NoweSilneHaslo123!;TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Issuer: "${JWT_ISSUER:-Forge.WebApi}"
      Jwt__Audience: "${JWT_AUDIENCE:-Forge.Web}"
      Jwt__Key: "${JWT_KEY:-CHANGE_ME_TO_A_LONG_RANDOM_SECRET_AT_LEAST_32_CHARS_LONG_!@#}"
      Jwt__ExpiresMinutes: "${JWT_EXPIRES_MINUTES:-120}"
      Realtime__Redis: "redis:6379"
      Realtime__ChannelPrefix: "forge"
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  web:
    build:
      context: ./Forge.Web
      dockerfile: Dockerfile
    ports:
      - "4300:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  dbdata:
