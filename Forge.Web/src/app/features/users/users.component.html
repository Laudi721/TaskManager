<header class="users__header">
  <h2>Użytkownicy</h2>
  <span class="users__spacer"></span>
  <button mat-icon-button type="button" (click)="refresh()" [disabled]="loading()" aria-label="Odśwież">
    <mat-icon>refresh</mat-icon>
  </button>
  <button mat-flat-button color="primary" type="button" (click)="addUser()">
    <mat-icon>add</mat-icon>
    <span>Dodaj użytkownika</span>
  </button>
</header>

@if (loading()) {
  <mat-spinner diameter="32"></mat-spinner>
} @else if (error()) {
  <p class="error">{{ error() }}</p>
} @else {
  <table mat-table [dataSource]="users()" class="mat-elevation-z1">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let u">{{ u.id }}</td>
    </ng-container>

    <ng-container matColumnDef="login">
      <th mat-header-cell *matHeaderCellDef>Login</th>
      <td mat-cell *matCellDef="let u">{{ u.login }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Imię i nazwisko</th>
      <td mat-cell *matCellDef="let u">{{ u.name }}</td>
    </ng-container>

    <ng-container matColumnDef="roles">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let u">
        <mat-chip-set>
          @for (role of u.roles; track role) {
            <mat-chip>{{ role }}</mat-chip>
          }
        </mat-chip-set>
      </td>
    </ng-container>

    <ng-container matColumnDef="isArchive">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let u">
        @if (u.isArchive) {
          <span class="users__archive">Archiwalny</span>
        } @else {
          <span class="users__active">Aktywny</span>
        }
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="users__actions-cell">Akcje</th>
      <td mat-cell *matCellDef="let u" class="users__actions-cell">
        <button mat-icon-button
                type="button"
                (click)="toggleArchive(u)"
                [disabled]="isSelf(u)"
                [matTooltip]="isSelf(u) ? 'Nie można zmienić statusu własnego konta' : (u.isArchive ? 'Przywróć' : 'Archiwizuj')">
          <mat-icon>{{ u.isArchive ? 'unarchive' : 'archive' }}</mat-icon>
        </button>
        <button mat-icon-button
                type="button"
                color="warn"
                (click)="deleteUser(u)"
                [disabled]="isSelf(u)"
                [matTooltip]="isSelf(u) ? 'Nie można usunąć własnego konta' : 'Usuń'">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"
        [class.users__row--archived]="row.isArchive"></tr>
  </table>
}
