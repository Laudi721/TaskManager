<header class="roles__header">
  <h2>Role</h2>
  <span class="roles__spacer"></span>
  <button mat-icon-button type="button" (click)="refresh()" [disabled]="loading()" aria-label="Odśwież">
    <mat-icon>refresh</mat-icon>
  </button>
  <button mat-flat-button color="primary" type="button" (click)="addRole()">
    <mat-icon>add</mat-icon>
    <span>Dodaj rolę</span>
  </button>
</header>

@if (loading()) {
  <mat-spinner diameter="32"></mat-spinner>
} @else if (error()) {
  <p class="error">{{ error() }}</p>
} @else {
  <table mat-table [dataSource]="roles()" class="mat-elevation-z1">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let r">{{ r.id }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nazwa</th>
      <td mat-cell *matCellDef="let r">{{ r.name }}</td>
    </ng-container>

    <ng-container matColumnDef="usersCount">
      <th mat-header-cell *matHeaderCellDef>Użytkownicy</th>
      <td mat-cell *matCellDef="let r">{{ r.usersCount }}</td>
    </ng-container>

    <ng-container matColumnDef="isArchive">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let r">
        @if (r.isArchive) {
          <span class="roles__archive">Archiwalna</span>
        } @else {
          <span class="roles__active">Aktywna</span>
        }
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="roles__actions-cell">Akcje</th>
      <td mat-cell *matCellDef="let u" class="roles__actions-cell">
        <button mat-icon-button
                type="button"
                (click)="toggleArchive(u)">
          <mat-icon>{{ u.isArchive ? 'unarchive' : 'archive' }}</mat-icon>
        </button>
        <button mat-icon-button
                type="button"
                color="warn"
                (click)="deleteRole(u)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"
        [class.roles__row--archived]="row.isArchive"></tr>
  </table>
}
