<mat-toolbar color="primary" class="home-toolbar">
  <span class="home-toolbar__title">TaskManager</span>
  <span class="home-toolbar__spacer"></span>
  @if (currentUser(); as user) {
    <span class="home-toolbar__user">{{ user.name ?? user.login }}</span>
  }
  <button mat-stroked-button color="accent" type="button" (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Wyloguj</span>
  </button>
</mat-toolbar>

<main class="home-content"></main>
